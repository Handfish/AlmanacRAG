name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest # Docker is preinstalled → @testcontainers/postgresql works
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Format check
        run: pnpm exec dprint check
      - name: Typecheck
        run: pnpm exec tsc -b
      - name: Lint
        run: pnpm lint
      - name: Test (unit + testcontainer spine)
        run: pnpm test
